name: Selenium E2E

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend/frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Selenium test dependencies
        run: python -m pip install -r e2e/requirements.txt

      - name: Start frontend
        working-directory: frontend/frontend
        run: npm run dev -- --host 127.0.0.1 --port 5173 > ../../vite.log 2>&1 &

      - name: Wait for frontend
        run: python e2e/wait_for_url.py http://127.0.0.1:5173 90

      - name: Run Selenium tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: pytest -q

      - name: Upload Vite log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: vite.log
